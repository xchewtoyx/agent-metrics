name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Check formatting
        run: black --check .

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Record health snapshot
        run: |
          python - <<'PY' > /tmp/agent-metrics-ci-health.json
          import json
          from pathlib import Path

          metrics = {
              "contract_files": len(list(Path(".agent-metrics/contracts").glob("*.md"))),
              "pytest_passed": 1,
          }
          print(json.dumps(metrics, sort_keys=True))
          PY
          agent-metrics health --append --input-file /tmp/agent-metrics-ci-health.json --bundle agent-metrics-ci .

      - name: Upload health snapshot
        uses: actions/upload-artifact@v4
        with:
          name: agent-metrics-health
          path: .agent-metrics/health.jsonl
          if-no-files-found: error
